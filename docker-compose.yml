# docker-compose.yml
version: '3'

services:
  server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:3000"
    privileged: true
    restart: always
    command: ["./scripts/server"]

  workers:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    command: ["./scripts/workers"]

  db:
    image: postgres:13
    env_file: judge0.conf
    restart: always

  redis:
    image: redis:6
    restart: always
